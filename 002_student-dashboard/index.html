<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Student Management Dashboard</h1>

        <div class="form-section">
            <input type="text" id="name" placeholder="Student Name">
            <input type="number" id="age" placeholder="Age">
            <input type="number" id="marks" placeholder="Marks">
            <button id="addBtn">Add Student</button>
        </div>

        <div class="stats">
            <h2>Statistics</h2>
            <p>Total Students: <span id="totalStudents">0</span></p>
            <p>Average Marks: <span id="avgMarks">0</span></p>
            <p>Top Student: <span id="topStudent">None</span></p>
        </div>

        <div class="student-list">
            <h2>Students</h2>
            <ul id="studentContainer"></ul>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
